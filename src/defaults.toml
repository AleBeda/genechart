# Default preferences — embedded at compile time via include_str! in preferences.rs
title = "Default preferences"

[files]
gedcom = "{gedcom}" # First *.ged file in the working directory
highlights = ""
merge = []          # Further GEDCOM files to merge: ["second.ged", "third.ged", ...]
merge_aliases = []  # Alias files, one per merge entry: ["alias2.txt", "alias3.txt", ...]

[scope]
root = "" # If empty, the first individual in the GEDCOM file is used as root
generations = 4 # Number of generations to output, including the root
direction = "descendants" # Valid values: "desc[endants]", "anc[estors]" = "ped[igree]", "for[est]"

[show]
generation_num = true
nickname = false
sex = true
birth = true
death = true
marriage = true
notes = false
notes_html = false # notes only: render <a href="..."> as SVG hyperlinks
last_gen_spouses = false # Show spouses of the last generation (only applies to descendants/forest)
id = false # Show GEDCOM IDs of individuals and families (without the "@" chars, e.g. "I1", "F2") for debugging purposes
duplicated_individual = false # Show duplicated individuals at each position (fancy ancestors only); connects instances with a dashed line
photo = false # Show photo in the top portion of the box (boxes layout only)

[format]
individual = "{firstname} {lastname} {sex}"
individual_nickname = "{firstname} “{nickname}” {lastname} {sex}"
birth = "* {date:%d %b %Y}, {location}"
death = "× {date:%d %b %Y}, {location}"
marriage = "⚭ {date:%d %b %Y}, {location}"
date_qualifiers = "compact" # Valid values: "none", "gedcom", "compact"
no_name = "" # Text to show when an individual has no name; empty means omit the name line entirely
living = ""  # Text for {living} in format.individual when individual has living=true; empty = not shown

[custom.gedcom.tags]
# Non-standard GEDCOM tag names to capture. Change these to match your software's tags.
living     = "_LIVING"  # individual: living flag ("Y" or "N")
alt_name   = "NAM2"     # individual: alternate/romanized name
relig_name = "NAMH"     # individual: religious or transliterated name
relig_marr = "JMAR"     # family: religious or alternate marriage record reference

[plugins.parse]
# Experimental Lua plugins (only effective in builds compiled with `--features lua`;
# configuring a plugin in a build without Lua support is an error). Each value is a
# path to a Lua script file (empty = disabled). The `all` script runs before the
# type-specific `indi`/`fam` scripts. See README "Lua plugins (experimental)".
indi = ""  # script defining on_individual(ind), run for every individual
fam  = ""  # script defining on_family(fam), run for every family
all  = ""  # script defining both on_individual and on_family, run first

[layout]
type = "simple" # Valid values: "simple", "boxed_couples", "fan", "fancy", "boxes"
root_pos = "bottom" # Valid values: "bot[tom]", "top"

[layout.simple]
indent = 3
vert_spacing = 0

[layout.boxed_couples]
box_width = 240.0
box_height = 140.0
spouse_sep_height = 30.0
gap_width = 40.0
gap_height = 80.0
box_width_2_spouses = 520.0 # must be >= 2 * box_width + gap_width
box_width_3_spouses = 800.0 # must be >= 3 * box_width + 2 * gap_width

[layout.fan]
ring_height = 90       # radial thickness of each inner generation ring (canvas units)
ring_gap = 10          # gap between rings
outer_ring_height = 200  # radial thickness for outer (rotated-text) generation rings
radial_gen = 3         # depth at which to switch to radial text; 0 = all radial

[layout.fancy]
gen_width = 300.0      # horizontal distance between successive generations (canvas units)
child_gap = 10.0       # vertical gap between last spouse block and first child
anc_gap = 10.0         # vertical breathing room around each individual in ancestors mode
compact = true         # if true, gen_width is ignored; children stack below the spouse column

[layout.boxes]
box_width = 240.0
box_height = 80.0
gap_width = 40.0
gap_height = 80.0
couple_y_offset = 20.0  # vertical offset between individual and spouse box tops (descendants only)

[output]
type = "text" # Valid values: "text", "svg", "pdf"
path = "" # Output file path; empty means stdout
noclobber = false # If true, refuse to overwrite an existing output file

[output.paper]
size = "A4" # Valid values: "A0"–"A5", "letter", "custom"
orientation = "portrait" # Valid values: "port[rait]", "land[scape]"

[output.paper.custom]
width = 0.0   # mm; set both width and height > 0 to use custom paper size
height = 0.0  # mm

[output.poster]
rows = 1
columns = 1
overlap_mm = 0.0
alignment_lines = true
alignment_lines_color = 0xF80

[output.text]
title = "{gedcom}"
copyright = "© 2026 Alex Bedarida"

[output.style]
# Row-rule underlines (simple layout, svg/pdf only).
dot_leaders = true

[output.style.boxes]
width = 0.5
border = 0x222
background = 0xFFF
radius = 0.0

[output.style.wedges]
# Fan-layout wedge styling (same meaning as boxes). Colors accept alpha
# (4- or 8-digit hex, alpha-last), e.g. background = 0xFFF8 for translucent.
width = 0.5
border = 0x222
background = 0xFFF

[output.style.connectors]
width = 0.1
border = 0x000

[output.style.text]
names = 0x000
dates = 0x000
gen_numbers = 0x000
notes = 0x000
id = 0xE00
title = 0x000        # chart title text
copyright = 0x000    # copyright notice text
row_rule = 0xCCC     # row-rule underlines (simple layout dot-leaders)
note_bar = 0xCCC     # vertical bar beside a NOTE block
note_link = 0x06C    # <a href> links in notes (expands to #0066CC)

[output.style.text.highlights]
color = 0x00D
background_color = 0xFF6
fallback = "->" # Used when backend does not support colors
                # When "uppercase", capitalize text;
                # otherwise, use the string as-is to the left of the person's name (e.g. "-> John Doe")

[output.style.fonts]
names = "Georgia 14"
dates = "Arial 10"
descendant = "bold"
spouse = "regular"
title = "Georgia 24"
copyright = "Arial 8"
id = "Courier 8"

[output.style.spacing]
title = 12.0
copyright = 12.0
# Names too wide for their box (boxes / boxed_couples layouts) are compressed
# horizontally (X only) down to this fraction. >= 1.0 disables compression.
names_autocompress = 0.85

[output.style.realistic_tree]
# Replaces straight connector lines with organic tree branches (boxed_couples layout only;
# root_pos = bottom / default).  Boxes are always rendered on top of the tree graphics.
enabled = false
# style: rendering approach for the branches (an unknown name is an error when
# realistic_tree is enabled, not a silent fallback)
#   "tapered" — filled closed Bézier paths whose width decreases globally from root to tips (default)
#   "stroke"  — layered stroked S-curve Bézier paths with opacity-based taper
#   "filter"  — thick rounded paths with a white highlight for a cylindrical 3D look
#   "ink"     — hand-drawn coherent tree: flared trunk visible below the root box, organic
#               buttress roots, one continuous tapered stroke per child that runs along the
#               main limb and turns up under its box, white bark scratches, and a continuous
#               flat-topped open-ellipse leaf canopy
style = "tapered"
trunk_color = 0x3D2B1F  # dark brown
leaf_color = 0x4A7C3F   # forest green
# leaf_density: number of leaf clusters drawn at branch tips
#   "none" | "low" | "medium" | "high"
leaf_density = "medium"

[output.style.spacing.boxed_couples]
name_above = 4.0
date_above = 2.0

[photos]
directory = "photos"    # Relative to GEDCOM file directory
index = ""              # "" = ID-based naming (photos/<ID>.jpg/png); non-empty = path to index file
embedded = false        # false: linked SVG href; true: base64 data URI; PDF always embeds
width = 100.0           # Canvas units
height = 100.0          # Canvas units
margin = 2.0            # Whitespace on all 4 sides of the photo within the box
scale = "crop"          # "fit": preserve aspect ratio; "crop": fill and crop; "none": no scaling
box_resize = true       # If true, increase box height by (height + 2*margin) for all boxes
downsample = 72.0       # Max DPI for embedded images (96 CSS px/inch reference); 0.0 = no downsample

[diagnostics]
errors = true
warnings = false
info = false
debug = false
